name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version: stable

    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Examples
      run: |
        cd examples/go/search_product_recalls && go run . && cd -

    - name: Test
      run: cd ./go/ && go test ./...
